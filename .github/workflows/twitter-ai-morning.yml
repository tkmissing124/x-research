name: Twitter AI Morning

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sanity check config
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XR_TOPIC: ${{ vars.XR_TOPIC || 'AI' }}
          XR_HOURS: ${{ vars.XR_HOURS || '24' }}
          XR_MAX_RESULTS_PER_QUERY: ${{ vars.XR_MAX_RESULTS_PER_QUERY || '50' }}
          XR_CLUSTER_COUNT: ${{ vars.XR_CLUSTER_COUNT || '4' }}
          XR_POST_LINKS_PER_TOPIC: ${{ vars.XR_POST_LINKS_PER_TOPIC || '3' }}
          XR_LANGUAGE_HINTS: ${{ vars.XR_LANGUAGE_HINTS || 'ja,en' }}
          XR_DRY_RUN: ${{ vars.XR_DRY_RUN || 'false' }}
        run: |
          test -n "$X_BEARER_TOKEN" || { echo "X_BEARER_TOKEN is empty"; exit 1; }
          test -n "$SLACK_WEBHOOK_URL" || { echo "SLACK_WEBHOOK_URL is empty"; exit 1; }
          echo "XR_TOPIC=$XR_TOPIC"
          echo "XR_HOURS=$XR_HOURS"
          echo "XR_MAX_RESULTS_PER_QUERY=$XR_MAX_RESULTS_PER_QUERY"
          echo "XR_CLUSTER_COUNT=$XR_CLUSTER_COUNT"
          echo "XR_POST_LINKS_PER_TOPIC=$XR_POST_LINKS_PER_TOPIC"
          echo "XR_LANGUAGE_HINTS=$XR_LANGUAGE_HINTS"
          echo "XR_DRY_RUN=$XR_DRY_RUN"

      - name: Run batch
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XR_TOPIC: ${{ vars.XR_TOPIC || 'AI' }}
          XR_HOURS: ${{ vars.XR_HOURS || '24' }}
          XR_MAX_RESULTS_PER_QUERY: ${{ vars.XR_MAX_RESULTS_PER_QUERY || '50' }}
          XR_CLUSTER_COUNT: ${{ vars.XR_CLUSTER_COUNT || '4' }}
          XR_POST_LINKS_PER_TOPIC: ${{ vars.XR_POST_LINKS_PER_TOPIC || '3' }}
          XR_LANGUAGE_HINTS: ${{ vars.XR_LANGUAGE_HINTS || 'ja,en' }}
          XR_DRY_RUN: ${{ vars.XR_DRY_RUN || 'false' }}
        run: python -u run.py
