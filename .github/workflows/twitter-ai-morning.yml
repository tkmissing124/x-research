name: Twitter AI Morning

on:
  schedule:
    - cron: "17 19 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Sanity check config
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XR_TOPIC: ${{ vars.XR_TOPIC || 'AI' }}
          XR_HOURS: ${{ vars.XR_HOURS || '24' }}
          XR_CLUSTER_COUNT: ${{ vars.XR_CLUSTER_COUNT || '3' }}
          XR_POST_LINKS_PER_TOPIC: ${{ vars.XR_POST_LINKS_PER_TOPIC || '2' }}
          XR_LANGUAGE_HINTS: ${{ vars.XR_LANGUAGE_HINTS || 'ja,en' }}
          XR_SOURCE_MODE: ${{ vars.XR_SOURCE_MODE || 'mixed' }}
          XR_OFFICIAL_X_HANDLES: ${{ vars.XR_OFFICIAL_X_HANDLES || 'OpenAI,AnthropicAI,GoogleDeepMind,xAI,GoogleAI' }}
          XR_PRIORITY_X_HANDLES: ${{ vars.XR_PRIORITY_X_HANDLES || 'Codestudiopjbk,ImAI_Eruel' }}
          XR_MODEL: ${{ vars.XR_MODEL || 'grok-4.3' }}
          XR_MAX_TURNS: ${{ vars.XR_MAX_TURNS || '2' }}
          XR_ALLOWED_X_HANDLES: ${{ vars.XR_ALLOWED_X_HANDLES || '' }}
          XR_EXCLUDED_X_HANDLES: ${{ vars.XR_EXCLUDED_X_HANDLES || '' }}
          XR_DRY_RUN: ${{ vars.XR_DRY_RUN || 'false' }}
        run: |
          test -n "$SLACK_WEBHOOK_URL" || { echo "SLACK_WEBHOOK_URL is empty"; exit 1; }
          if [ "$XR_DRY_RUN" != "true" ]; then
            test -n "$XAI_API_KEY" || { echo "XAI_API_KEY is empty"; exit 1; }
          fi
          echo "XR_TOPIC=$XR_TOPIC"
          echo "XR_HOURS=$XR_HOURS"
          echo "XR_CLUSTER_COUNT=$XR_CLUSTER_COUNT"
          echo "XR_POST_LINKS_PER_TOPIC=$XR_POST_LINKS_PER_TOPIC"
          echo "XR_LANGUAGE_HINTS=$XR_LANGUAGE_HINTS"
          echo "XR_SOURCE_MODE=$XR_SOURCE_MODE"
          echo "XR_PRIORITY_X_HANDLES=$XR_PRIORITY_X_HANDLES"
          echo "XR_MODEL=$XR_MODEL"
          echo "XR_MAX_TURNS=$XR_MAX_TURNS"
          echo "XR_DRY_RUN=$XR_DRY_RUN"

      - name: Run batch
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          XR_TOPIC: ${{ vars.XR_TOPIC || 'AI' }}
          XR_HOURS: ${{ vars.XR_HOURS || '24' }}
          XR_CLUSTER_COUNT: ${{ vars.XR_CLUSTER_COUNT || '3' }}
          XR_POST_LINKS_PER_TOPIC: ${{ vars.XR_POST_LINKS_PER_TOPIC || '2' }}
          XR_LANGUAGE_HINTS: ${{ vars.XR_LANGUAGE_HINTS || 'ja,en' }}
          XR_SOURCE_MODE: ${{ vars.XR_SOURCE_MODE || 'mixed' }}
          XR_OFFICIAL_X_HANDLES: ${{ vars.XR_OFFICIAL_X_HANDLES || 'OpenAI,AnthropicAI,GoogleDeepMind,xAI,GoogleAI' }}
          XR_PRIORITY_X_HANDLES: ${{ vars.XR_PRIORITY_X_HANDLES || 'Codestudiopjbk,ImAI_Eruel' }}
          XR_MODEL: ${{ vars.XR_MODEL || 'grok-4.3' }}
          XR_MAX_TURNS: ${{ vars.XR_MAX_TURNS || '2' }}
          XR_ALLOWED_X_HANDLES: ${{ vars.XR_ALLOWED_X_HANDLES || '' }}
          XR_EXCLUDED_X_HANDLES: ${{ vars.XR_EXCLUDED_X_HANDLES || '' }}
          XR_DRY_RUN: ${{ vars.XR_DRY_RUN || 'false' }}
        run: python -u run.py
